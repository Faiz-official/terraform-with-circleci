version: 2.1

jobs:
  terraform:
    docker:
      - image: hashicorp/terraform:1.6.6
    steps:
      - checkout

      - run:
          name: Terraform Init
          command: terraform init

      - run:
          name: Terraform Plan
          command: terraform plan -var-file="terraform.tfvars"

      - run:
          name: Terraform Apply
          command: terraform apply -auto-approve -var-file="terraform.tfvars"

  terraform_destroy:
    docker:
      - image: hashicorp/terraform:1.6.6
    steps:
      - checkout

      - run:
          name: Terraform Init
          command: terraform init

      - run:
          name: Terraform Destroy
          command: terraform destroy -auto-approve -var-file="terraform.tfvars"

workflows:
  terraform_pipeline:
    jobs:
      - terraform
      # Uncomment the next line if you want destroy to run automatically
      # - terraform_destroy:
      #     requires:
      #       - terraform